<!DOCTYPE html>
<!-- Coding By CodingNepal - www.codingnepalweb.com -->
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Glassmorphism Register Form | CodingNepal</title>
  <link rel="stylesheet" href="style.css">
  <!-- Font Awesome untuk ikon Google (jika diperlukan) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
   <div class="wrapper">
     <form action="#" class="register" id="registerForm">
      <h2>Register</h2>
      
      <!-- Added id="username" and placeholder from the image -->
      <div class="input-field field">
        <input type="text" placeholder="username" required id="username">
        <label>Enter your username</label>
      </div>
          <!-- Added id="username" and placeholder from the image -->
      <div class="input-field field">
        <input type="text" placeholder="email" required id="email">
        <label>Enter your email</label>
      </div>
        
      <!-- Added id="password" and placeholder from the image -->
      <div class="input-field field">
        <input type="password" placeholder="Password" required id="password">
        <label>Enter your password</label>
      </div>
      
      <!-- Tempat menampilkan pesan error/sukses dari JavaScript -->
      <p id="message"></p>
      
      <button type="submit">Daftar</button>
      
      <div class="social">
        <div class="go">
          <a href="index.html">Login</a>
        </div>
        <div class="kanan">
          <i class="fab fa-google"></i> with Google
        </div>
      </div>
    </form>
  </div>

  <!-- Box Alert tambahan (jika skrip JS Anda membutuhkannya) -->
  <div id="alertBox" class="alert" style="display:none;"></div>

<p id="message"></p>
<script src="register.js" defer></script>
</body>
</html>
