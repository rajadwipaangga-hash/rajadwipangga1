<!DOCTYPE html>
<!-- Coding By CodingNepal - www.codingnepalweb.com -->
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Glassmorphism Register Form | CodingNepal</title>
  <link rel="stylesheet" href="style.css">
  <!-- Font Awesome untuk ikon Google (jika diperlukan) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
  <div class="wrapper">
    <form id="registerForm">
      <h3>Register</h3>
      
      <label for="username">Nama Pengguna</label>
      <input type="text" id="username" required placeholder="Username">
      
      <label for="email">Email</label>
      <input type="email" id="email" required placeholder="Email">
      
      <label for="password">Password</label>
      <input type="password" id="password" required placeholder="Password">
      
      <!-- Tempat menampilkan pesan error/sukses dari JavaScript -->
      <p id="message"></p>
      
      <button type="submit">Daftar</button>
      
      <div class="social">
        <div class="go">
          <a href="index.html">Login</a>
        </div>
        <div class="kanan">
          <i class="fab fa-google"></i> with Google
        </div>
      </div>
    </form>
  </div>

  <!-- Box Alert tambahan (jika skrip JS Anda membutuhkannya) -->
  <div id="alertBox" class="alert" style="display:none;"></div>

  <script src="register.js" defer></script>
</body>
</html>
